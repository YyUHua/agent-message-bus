<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Bus · Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#111214;color:#e4e6ea;
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  height:100vh;display:flex;flex-direction:column;
  overflow:hidden
}
/* header */
.header{
  padding:12px 20px;border-bottom:1px solid #2a2a2e;
  background:#1a1b1e;flex-shrink:0;
  display:flex;align-items:center;gap:10px
}
.header h1{font-size:16px;font-weight:600;letter-spacing:0.3px}
.header .badge{
  font-size:11px;color:#8b8b8e;background:#252529;
  padding:2px 8px;border-radius:4px
}
/* messages area */
#chat-box{
  flex:1;overflow-y:auto;padding:16px 20px;
  display:flex;flex-direction:column;gap:8px;
  scroll-behavior:smooth
}
.msg-row{display:flex;margin:2px 0}
.msg-row.in{justify-content:flex-start}
.msg-row.out{justify-content:flex-end}
.msg-bubble{
  max-width:72%;padding:10px 14px;line-height:1.65;
  font-size:15px;white-space:pre-wrap;word-break:break-word;
  border-radius:8px;position:relative
}
.msg-row.in .msg-bubble{
  background:#1e1f23;color:#e4e6ea;
  border-bottom-left-radius:4px
}
.msg-row.out .msg-bubble{
  background:#2b6c3f;color:#e4e6ea;
  border-bottom-right-radius:4px
}
.msg-time{
  font-size:11px;color:#5c5c5e;margin-top:4px;text-align:right
}
/* thinking indicator */
.thinking{
  display:none;align-items:center;gap:6px;
  padding:12px 16px;margin:4px 0;
  background:#1a1b1f;border-radius:8px;align-self:flex-start
}
.thinking.show{display:flex}
.dot{width:6px;height:6px;background:#6b6b6e;border-radius:50%;animation:bounce 1.4s infinite ease-in-out both}
.dot:nth-child(1){animation-delay:-0.32s}
.dot:nth-child(2){animation-delay:-0.16s}
@keyframes bounce{0%,80%,100%{transform:scale(0.6)}40%{transform:scale(1)}}
/* input area */
.input-area{
  padding:12px 16px 16px;border-top:1px solid #2a2a2e;
  background:#1a1b1e;flex-shrink:0;
  display:flex;gap:10px;align-items:flex-end
}
#input{
  flex:1;resize:none;padding:10px 14px;border:none;outline:none;
  border-radius:8px;background:#252529;color:#e4e6ea;
  font-size:15px;line-height:1.4;font-family:inherit;
  max-height:120px;min-height:44px
}
#input::placeholder{color:#555558}
#send-btn{
  width:44px;height:44px;border:none;border-radius:8px;
  background:#2b6c3f;color:#fff;font-size:20px;
  cursor:pointer;flex-shrink:0;transition:background 0.15s
}
#send-btn:hover{background:#3a8a53}
#send-btn:disabled{opacity:0.4;cursor:default}
/* session info */
.footer{
  padding:6px 16px;background:#151518;border-top:1px solid #2a2a2e;
  font-size:11px;color:#5c5c5e;text-align:center;flex-shrink:0
}
</style>
</head>
<body>
<div class="header">
  <h1>Agent Bus</h1>
  <span class="badge">user</span>
</div>
<div id="chat-box">
  <div class="msg-row in">
    <div class="msg-bubble">来啦，想聊什么？</div>
  </div>
</div>
<div class="thinking" id="thinking">
  <span class="dot"></span><span class="dot"></span><span class="dot"></span>
</div>
<div class="input-area">
  <textarea id="input" placeholder="说点什么…" rows="1"></textarea>
  <button id="send-btn">➤</button>
</div>
<div class="footer">session: user · 所有入口共享上下文</div>

<script>
const chat = document.getElementById('chat-box');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const thinking = document.getElementById('thinking');
let sending = false;

function autoResize(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px'}
input.addEventListener('input',autoResize);

input.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}
});

sendBtn.addEventListener('click',send);

async function send(){
  const msg = input.value.trim();
  if(!msg||sending) return;
  input.value='';autoResize();
  sending = true;
  sendBtn.disabled = true;

  // outgoing bubble
  const outRow = document.createElement('div');
  outRow.className = 'msg-row out';
  outRow.innerHTML = `<div class="msg-bubble">${escapeHtml(msg)}<div class="msg-time">刚刚</div></div>`;
  chat.appendChild(outRow);
  chat.scrollTop = chat.scrollHeight;

  // thinking dots
  thinking.classList.add('show');
  chat.scrollTop = chat.scrollHeight;

  // incoming bubble
  const inRow = document.createElement('div');
  inRow.className = 'msg-row in';
  const inBubble = document.createElement('div');
  inBubble.className = 'msg-bubble';
  inRow.appendChild(inBubble);
  chat.appendChild(inRow);

  try {
    const resp = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,stream:true})
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let done = false;
    let reply = '';

    while(!done){
      const {value,done:d} = await reader.read();
      done = d;
      if(value){
        const text = decoder.decode(value);
        const lines = text.split('\n');
        for(const line of lines){
          if(!line.trim()||!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if(data.content){
              reply += data.content;
              inBubble.textContent = reply;
              chat.scrollTop = chat.scrollHeight;
            }
          } catch(e){}
        }
      }
    }
    // add timestamp
    const timeDiv = document.createElement('div');
    timeDiv.className = 'msg-time';
    timeDiv.textContent = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    inBubble.appendChild(timeDiv);
  } catch(e){
    inBubble.textContent = '连接失败，请检查服务器。';
  } finally {
    thinking.classList.remove('show');
    sending = false;
    sendBtn.disabled = false;
    chat.scrollTop = chat.scrollHeight;
  }
}

function escapeHtml(t){
  const d=document.createElement('div');
  d.textContent=t;
  return d.innerHTML;
}
</script>
</body>
</html>
